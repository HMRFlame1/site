<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameCircuit Championship 2026 • Black Ops II</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Keep all your existing styles here (same as you provided) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Anton&amp;display=swap');
        body { background-color: #ffffff; color: #1f2937; font-family: 'Inter', system_ui, sans-serif; }
        .esports-card { background-color: #111111; border: 1px solid #FF0000; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .esports-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(255, 0, 0, 0.2); }
        .mlg-table { font-size: 14px; }
        .mlg-table th { background-color: #1a1a1a; color: #FF0000; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 12px; padding: 12px 14px; text-align: left; }
        .mlg-table td { padding: 12px 14px; border-bottom: 1px solid #222222; }
        .mlg-table tr:hover { background-color: #151515; }
        .sidebar-tab { transition: all 0.2s ease; font-weight: 600; font-size: 13px; letter-spacing: 0.5px; color: #FF0000; }
        .sidebar-tab.active { color: #FF0000; border-bottom: 2px solid #FF0000; }
        .feature-box { background-color: #111111; border: 1px solid #333333; transition: all 0.2s ease; }
        .feature-box:hover { border-color: #FF0000; background-color: #1a1a1a; }
        .who-to-watch-card { position: relative; overflow: hidden; border: 2px solid #FF0000; background-size: cover; background-position: center; height: 260px; }
        .who-to-watch-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.85) 75%); }
        .dark-panel { background-color: #111111; border: 1px solid #333333; }
        .hero-bg { background: url('https://www.gamecircuit.co.uk/uploads/1/5/2/9/152994747/ban1_orig.jpg'); background-size: cover; background-position: calc(50% - 10px) center; }
        .dark-panel, .esports-card, .feature-box, .mlg-table td { color: #f1f1f1; }
        .news-ticker { background-color: #0a0a0a; border-bottom: 1px solid #222222; overflow: hidden; padding: 14px 0; }
        .ticker-wrapper { overflow: hidden; width: 100%; }
        .ticker-content { display: flex; align-items: center; white-space: nowrap; animation: ticker-scroll 18s linear infinite; }
        .ticker-item { display: inline-flex; align-items: center; padding-right: 5rem; color: #FFD700; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.4px; }
        @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        .news-ticker:hover .ticker-content { animation-play-state: paused; }
        .free-agent-card { transition: all 0.2s ease; }
        .free-agent-card:hover { border-color: #FF0000; transform: translateY(-1px); }
        .page-modal { animation: fadeInScale 0.2s ease forwards; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <!-- Top Navigation + Hero + Ticker + Main Content (unchanged) -->
    <!-- ... (keep everything exactly as you sent until the Free Agents Modal) -->

    <!-- ========== FREE AGENTS SEPARATE PAGE (MODAL) ========== -->
    <div id="free-agents-page-modal" onclick="if (event.target.id === 'free-agents-page-modal') closeFreeAgentsPage()"
         class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-4">
       
        <div onclick="event.stopImmediatePropagation()"
             class="page-modal w-full max-w-6xl bg-[#0a0a0a] border border-[#FF0000] rounded-xl overflow-hidden shadow-2xl">
           
            <!-- Modal Header -->
            <div class="bg-black border-b border-[#FF0000] px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <img src="https://www.gamecircuit.co.uk/uploads/1/5/2/9/152994747/chatgpt-image-jul-15-2026-03-28-29-am_orig.png" class="h-8 w-auto">
                    <div>
                        <span class="font-black text-2xl tracking-[-1px] text-white">GAMECIRCUIT</span>
                        <span class="ml-3 text-[#FF0000] font-bold text-xl">FREE AGENT HUB</span>
                    </div>
                </div>
                <button onclick="closeFreeAgentsPage()" class="flex items-center gap-x-2 px-5 py-2 text-sm font-bold border border-[#333] hover:bg-[#222] rounded-lg transition-colors">
                    <i class="fas fa-times mr-1"></i> CLOSE
                </button>
            </div>
           
            <div class="p-8">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-black tracking-tight text-white">Find Your Next Teammate</h1>
                    <p class="text-gray-400 mt-2 max-w-md mx-auto">Browse active free agents or register yourself to get noticed by teams.</p>
                </div>
               
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                   
                    <!-- BROWSE FREE AGENTS -->
                    <div class="lg:col-span-7">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold text-xl text-[#FF0000]">LATEST FREE AGENTS</h3>
                            <span class="text-xs px-3 py-1 bg-[#1a1a1a] rounded-full text-gray-400" id="agent-count">Loading...</span>
                        </div>
                       
                        <div id="free-agents-list-page" class="space-y-3 max-h-[420px] overflow-y-auto pr-2">
                            <!-- Populated dynamically from backend -->
                        </div>
                    </div>
                   
                    <!-- REGISTER FORM -->
                    <div class="lg:col-span-5">
                        <div class="dark-panel border border-[#FF0000] p-6 rounded-xl">
                            <h3 class="font-bold text-xl mb-1 text-[#FF0000]">Register as a Free Agent</h3>
                            <p class="text-sm text-gray-400 mb-5">Get discovered by teams looking for players.</p>
                           
                            <form id="free-agent-form-page" onsubmit="submitFreeAgentFromPage(event)">
                                <div class="space-y-4">
                                    <div>
                                        <label class="text-xs text-gray-400 block mb-1.5">GAMERTAG / PSN / XBL</label>
                                        <input type="text" id="fa-gamertag-page" class="w-full bg-[#111] border border-[#333] text-white px-4 py-2.5 rounded-lg" placeholder="YourTag#1234" required>
                                    </div>
                                   
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="text-xs text-gray-400 block mb-1.5">PLATFORM</label>
                                            <select id="fa-platform-page" class="w-full bg-[#111] border border-[#333] text-white px-4 py-2.5 rounded-lg">
                                                <option>Xbox 360</option>
                                                <option>PlayStation 3</option>
                                                <option>PC (Plutonium)</option>
                                                <option>Other</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="text-xs text-gray-400 block mb-1.5">PREFERRED ROLE</label>
                                            <select id="fa-role-page" class="w-full bg-[#111] border border-[#333] text-white px-4 py-2.5 rounded-lg">
                                                <option>Slayer / SMG</option>
                                                <option>Main AR</option>
                                                <option>Flex / OBJ</option>
                                                <option>Support / Anchor</option>
                                                <option>Any</option>
                                            </select>
                                        </div>
                                    </div>
                                   
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="text-xs text-gray-400 block mb-1.5">COUNTRY</label>
                                            <input type="text" id="fa-country-page" class="w-full bg-[#111] border border-[#333] text-white px-4 py-2.5 rounded-lg" placeholder="UK" required>
                                        </div>
                                        <div>
                                            <label class="text-xs text-gray-400 block mb-1.5">AVAILABILITY</label>
                                            <input type="text" id="fa-availability-page" class="w-full bg-[#111] border border-[#333] text-white px-4 py-2.5 rounded-lg" placeholder="Evenings (BST)" required>
                                        </div>
                                    </div>
                                   
                                    <div>
                                        <label class="text-xs text-gray-400 block mb-1.5">SHORT BIO / NOTES</label>
                                        <textarea id="fa-bio-page" rows="2" class="w-full bg-[#111] border border-[#333] text-white px-4 py-2.5 rounded-lg resize-y" placeholder="Experienced BO2 player..."></textarea>
                                    </div>
                                   
                                    <div>
                                        <label class="text-xs text-gray-400 block mb-1.5">DISCORD TAG</label>
                                        <input type="text" id="fa-discord-page" class="w-full bg-[#111] border border-[#333] text-white px-4 py-2.5 rounded-lg" placeholder="username#0000" required>
                                    </div>
                                </div>
                               
                                <button type="submit" class="mt-6 w-full py-3.5 bg-[#FF0000] hover:bg-red-700 transition-colors text-white font-bold text-sm tracking-wider rounded-lg">
                                    SUBMIT MY FREE AGENT PROFILE
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== BACKEND CONFIG ====================
        const API_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE"; // ← Replace this with your deployed URL

        // ==================== FREE AGENTS FUNCTIONS ====================

        async function renderFreeAgentsInModal() {
            const container = document.getElementById('free-agents-list-page');
            container.innerHTML = '<div class="text-center text-gray-400 py-8">Loading free agents...</div>';

            try {
                const res = await fetch(`${API_URL}?action=getFreeAgents`);
                const data = await res.json();

                if (!data.success) {
                    container.innerHTML = `<div class="text-center text-red-400 py-8">${data.message}</div>`;
                    return;
                }

                const agents = data.agents || [];
                document.getElementById('agent-count').textContent = `${agents.length} agents online`;
                container.innerHTML = '';

                agents.forEach(agent => {
                    const card = document.createElement('div');
                    card.className = 'free-agent-card bg-[#111111] border border-[#333333] hover:border-[#FF0000] p-4 rounded-xl text-sm';

                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="font-bold text-lg text-white">${agent.username}</div>
                                <div class="text-[#FF0000] text-xs font-semibold mt-0.5">${agent.role} • ${agent.country}</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="contactAgent('${agent.discord.replace(/'/g, "\\'")}'); event.stopImmediatePropagation();" 
                                        class="px-3 py-1 text-xs font-bold bg-[#FF0000] hover:bg-red-700 text-white rounded-lg transition-colors">
                                    CONTACT
                                </button>
                                <button onclick="deleteFreeAgentFromModal('${agent.discord.replace(/'/g, "\\'")}'); event.stopImmediatePropagation();" 
                                        class="px-3 py-1 text-xs font-bold bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
                                    DELETE
                                </button>
                            </div>
                        </div>
                        <div class="mt-2 text-gray-300 text-sm">${agent.bio || 'No bio provided.'}</div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                container.innerHTML = `<div class="text-center text-red-400 py-8">Failed to load free agents. Check backend URL.</div>`;
            }
        }

        async function submitFreeAgentFromPage(event) {
            event.preventDefault();

            const formData = {
                action: "submitFreeAgent",
                gamertag: document.getElementById('fa-gamertag-page').value.trim(),
                role: document.getElementById('fa-role-page').value,
                country: document.getElementById('fa-country-page').value.trim(),
                discord: document.getElementById('fa-discord-page').value.trim()
            };

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formData)
                });

                const result = await res.json();

                if (result.success) {
                    document.getElementById('free-agent-form-page').reset();
                    await renderFreeAgentsInModal(); // refresh list

                    const success = document.createElement('div');
                    success.className = 'mt-4 text-center text-green-400 text-sm font-bold';
                    success.innerHTML = `✅ Profile submitted successfully!`;
                    document.getElementById('free-agent-form-page').parentNode.appendChild(success);
                    setTimeout(() => success.remove(), 2500);
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                alert("Failed to submit. Please check your backend URL.");
            }
        }

        async function deleteFreeAgentFromModal(discordTag) {
            if (!confirm("Are you sure you want to delete this free agent profile?")) return;

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "deleteFreeAgent",
                        discord: discordTag
                    })
                });

                const result = await res.json();

                if (result.success) {
                    await renderFreeAgentsInModal();
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                alert("Failed to delete profile.");
            }
        }

        function contactAgent(discordTag) {
            // Your existing contact modal code (keep it)
            const modalHTML = `
                <div class="fixed inset-0 bg-black/90 flex items-center justify-center z-[300]" onclick="this.remove()">
                    <div onclick="event.stopImmediatePropagation()" class="dark-panel border-2 border-[#FF0000] p-7 max-w-sm w-full mx-4 rounded-2xl">
                        <h4 class="font-bold text-2xl mb-4 text-[#FF0000]">Contact Player</h4>
                        <p class="text-gray-300 mb-4">Send a message on Discord:</p>
                        <div class="bg-black border border-[#FF0000]/60 px-6 py-5 rounded-2xl font-mono text-center text-2xl tracking-[3px] mb-6 text-white">
                            ${discordTag}
                        </div>
                        <div class="flex gap-3">
                            <button onclick="this.closest('.fixed').remove()" class="flex-1 py-3 border border-[#444] hover:bg-[#222] rounded-xl font-medium">CLOSE</button>
                            <button onclick="copyDiscordTag('${discordTag.replace(/'/g, "\\'")}', this)" class="flex-1 py-3 bg-[#FF0000] hover:bg-red-700 text-white font-bold rounded-xl flex items-center justify-center gap-x-2">
                                <i class="fas fa-copy"></i> COPY TAG
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        function copyDiscordTag(tag, btn) {
            navigator.clipboard.writeText(tag).then(() => {
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.closest('.fixed').remove(), 800);
            }).catch(() => {
                alert('Discord: ' + tag);
                btn.closest('.fixed').remove();
            });
        }

        function openFreeAgentsPage() {
            const modal = document.getElementById('free-agents-page-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            renderFreeAgentsInModal();
        }

        function closeFreeAgentsPage() {
            const modal = document.getElementById('free-agents-page-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        function init() {
            document.getElementById('sidebar-tab-btn-0').classList.add('active', 'border-b-2', 'border-[#FF0000]');
            document.getElementById('sidebar-tab-0').classList.remove('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
